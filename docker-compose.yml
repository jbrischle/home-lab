# More info at https://github.com/pi-hole/docker-pi-hole/ and https://docs.pi-hole.net/
#
# Network setup: macvlan
# The Pi-hole container gets its own dedicated IP on the LAN (192.168.178.2),
# so it does not conflict with the NAS's port 53.
# Note: the NAS host cannot reach the container directly over macvlan.
# If you need that, set up a "shim" macvlan interface on the host (see Step 6).
services:
  pihole:
    container_name: pihole
    image:          pihole/pihole:latest
    hostname:       pihole
    networks:
      pihole_net:
        ipv4_address: 192.168.178.2
    environment:
      TZ:                             'Europe/Berlin'
      FTLCONF_webserver_port:         8081
      FTLCONF_webserver_api_password: '__WEB_UI_PASSWORT__'
      FTLCONF_dns_listeningMode:      'all'
      FTLCONF_dns_upstreams:          '1.1.1.1;9.9.9.9' # default upstream DNS servers
    # default upstream DNS servers for bootstrapping
    dns:
      - 1.1.1.1
      - 9.9.9.9
    volumes:
      #  - '/volume1/docker/pihole/var:/var'
      - '/volume1/docker/pihole/etc:/etc/pihole'
      - '/volume1/docker/pihole/dnsmasq:/etc/dnsmasq.d'
    #   https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    restart:        unless-stopped

networks:
  pihole_net:
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet:   192.168.178.0/24
          gateway:  192.168.178.1
          ip_range: 192.168.178.2/32

